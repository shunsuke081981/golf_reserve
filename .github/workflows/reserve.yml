name: Golf Auto-Reservation

on:
  schedule:
    - cron: "53 23 * * *"   # 08:53 JST
    - cron: "53 0 * * *"    # 09:53 JST
    - cron: "53 1 * * *"    # 10:53 JST
    - cron: "53 2 * * *"    # 11:53 JST
    - cron: "53 3 * * *"    # 12:53 JST
    - cron: "53 4 * * *"    # 13:53 JST
  workflow_dispatch:

jobs:
  reserve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright google-api-python-client google-auth
          playwright install chromium --with-deps

      - name: Run reservation script
        run: python reserve.py
        env:
          SWING24_USERNAME: ${{ secrets.SWING24_USERNAME }}
          SWING24_PASSWORD: ${{ secrets.SWING24_PASSWORD }}

      - name: Sync to Google Calendar
        if: always()
        run: python sync_calendar.py
        env:
          SWING24_USERNAME: ${{ secrets.SWING24_USERNAME }}
          SWING24_PASSWORD: ${{ secrets.SWING24_PASSWORD }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_CREDENTIALS: ${{ secrets.GOOGLE_CALENDAR_CREDENTIALS }}
