name: Golf Auto-Reservation

on:
  schedule:
    - cron: "0 4 * * *"    # 13:00 JST
    - cron: "0 6 * * *"    # 15:00 JST
    - cron: "0 7 * * *"    # 16:00 JST
    - cron: "0 8 * * *"    # 17:00 JST
    - cron: "0 9 * * *"    # 18:00 JST
    - cron: "0 10 * * *"   # 19:00 JST
    - cron: "0 11 * * *"   # 20:00 JST
    - cron: "0 12 * * *"   # 21:00 JST
  workflow_dispatch:

jobs:
  reserve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run reservation script
        run: python reserve.py
        env:
          SWING24_USERNAME: ${{ secrets.SWING24_USERNAME }}
          SWING24_PASSWORD: ${{ secrets.SWING24_PASSWORD }}
