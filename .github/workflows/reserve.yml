name: Golf Auto-Reservation

on:
  schedule:
    - cron: "53 3 * * *"    # 12:53 JST
    - cron: "53 5 * * *"    # 14:53 JST
    - cron: "53 6 * * *"    # 15:53 JST
    - cron: "53 7 * * *"    # 16:53 JST
    - cron: "53 8 * * *"    # 17:53 JST
    - cron: "53 9 * * *"    # 18:53 JST
    - cron: "53 10 * * *"   # 19:53 JST
    - cron: "53 11 * * *"   # 20:53 JST
  workflow_dispatch:

jobs:
  reserve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run reservation script
        run: python reserve.py
        env:
          SWING24_USERNAME: ${{ secrets.SWING24_USERNAME }}
          SWING24_PASSWORD: ${{ secrets.SWING24_PASSWORD }}
